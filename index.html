<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID FINAL</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>body { margin: 0; background: #000; overflow: hidden; }</style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    physics: { default: 'arcade' },
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    scene: { create: create, update: update }
};

let player, obstacles, score = 0, scoreText, gameStarted = false, nextObstacle = 0;
const game = new Phaser.Game(config);

function create() {
    player = this.add.rectangle(150, 300, 40, 40, 0x00ffff);
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true);
    obstacles = this.physics.add.group();
    scoreText = this.add.text(400, 100, '0', { fontSize: '100px', fill: '#fff' }).setOrigin(0.5).setAlpha(0.2);
    this.add.text(400, 300, 'TAP TO PLAY', { fontSize: '40px', fill: '#fff' }).setOrigin(0.5).setName('t');
    
    this.input.on('pointerdown', () => {
        if (!gameStarted) {
            gameStarted = true;
            this.children.getByName('t').destroy();
            player.body.setVelocityY(400);
        } else {
            player.body.setVelocityY(player.body.velocity.y * -1);
            player.setFillStyle(player.body.velocity.y > 0 ? 0x00ffff : 0xff00ff);
        }
    });
}

function update(time) {
    if (!gameStarted) return;

    // SISTEMA MANUAL: Si el tiempo actual supera al marcador, soltamos bloque
    if (time > nextObstacle) {
        const isTop = Math.random() > 0.5;
        let obs = this.add.rectangle(850, isTop ? 100 : 500, 60, 250, 0xffffff);
        this.physics.add.existing(obs);
        obs.body.setVelocityX(-450);
        obstacles.add(obs);
        nextObstacle = time + 1500; // Siguiente en 1.5 segundos
    }

    // Colisiones
    this.physics.add.overlap(player, obstacles, () => {
        location.reload();
    });

    // Puntuación
    obstacles.children.iterate(child => {
        if (child && child.x < -50) {
            child.destroy();
            score++;
            scoreText.setText(score);
        }
    });
}
</script>
</body>
</html>
