<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID - Native</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background: #050505; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // Ajuste de pantalla
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    let gameStarted = false;
    let gameOver = false;

    const player = {
        x: canvas.width * 0.2,
        y: canvas.height / 2,
        size: 30,
        vy: 0,
        speed: 7,
        color: '#00ffff'
    };

    let obstacles = [];
    let frame = 0;

    function spawnObstacle() {
        const h = canvas.height * 0.4;
        const isTop = Math.random() > 0.5;
        obstacles.push({
            x: canvas.width + 50,
            y: isTop ? 0 : canvas.height - h,
            w: 50,
            h: h
        });
    }

    function update() {
        if (!gameStarted || gameOver) return;

        frame++;
        player.y += player.vy;

        // Limites pantalla
        if (player.y < 0) player.y = 0;
        if (player.y + player.size > canvas.height) player.y = canvas.height - player.size;

        // Obstáculos
        if (frame % 80 === 0) spawnObstacle();

        obstacles.forEach((obs, index) => {
            obs.x -= 5;

            // Colisión
            if (player.x < obs.x + obs.w &&
                player.x + player.size > obs.x &&
                player.y < obs.y + obs.h &&
                player.y + player.size > obs.y) {
                gameOver = true;
                setTimeout(() => location.reload(), 1000);
            }

            // Puntos
            if (obs.x + obs.w < 0) {
                obstacles.splice(index, 1);
                score++;
            }
        });
    }

    function draw() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Score fondo
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.font = 'bold 120px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(score, canvas.width/2, canvas.height/2 + 40);

        // Jugador
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.size, player.size);

        // Obstáculos
        ctx.fillStyle = '#ffffff';
        obstacles.forEach(obs => {
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
        });

        if (!gameStarted) {
            ctx.fillStyle = '#fff';
            ctx.font = '24px sans-serif';
            ctx.fillText('TAP TO START', canvas.width/2, canvas.height/2 + 150);
        }

        update();
        requestAnimationFrame(draw);
    }

    window.addEventListener('pointerdown', () => {
        if (!gameStarted) {
            gameStarted = true;
            player.vy = player.speed;
        } else {
            player.vy *= -1;
            player.color = player.vy > 0 ? '#00ffff' : '#ff00ff';
        }
    });

    draw();
</script>
</body>
</html>
