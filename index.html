<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID - PlayStore Edition</title>
    <style>
        :root { --neon: #00ffff; --pink: #ff00ff; }
        body { margin: 0; background: #050510; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 10; }
        
        /* Banner de publicidad simulado */
        #ad-banner { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50px; 
            background: #111; border-top: 1px solid #333; display: flex; 
            align-items: center; justify-content: center; font-size: 10px; color: #444; z-index: 100;
        }

        .menu-box { text-align: center; background: rgba(0,0,0,0.92); padding: 30px; border-radius: 25px; border: 2px solid #333; backdrop-filter: blur(15px); display: none; pointer-events: auto; width: 85%; max-width: 320px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        
        h1 { font-size: 50px; letter-spacing: 12px; margin: 0 0 20px 0; text-shadow: 0 0 20px var(--neon); color: var(--neon); }
        
        .btn { width: 100%; margin: 12px 0; padding: 18px; background: #111; color: white; border: 1px solid #444; border-radius: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 14px; transition: 0.3s; }
        .btn-main { border: 2px solid var(--pink); box-shadow: 0 0 15px rgba(255,0,255,0.2); }
        .btn-disabled { opacity: 0.4; font-size: 10px; cursor: default; }
        
        .lang-selector { position: absolute; top: 20px; right: 20px; pointer-events: auto; z-index: 20; }
        .lang-btn { background: rgba(255,255,255,0.05); border: 1px solid #444; color: #888; padding: 6px 12px; border-radius: 8px; margin-left: 5px; cursor: pointer; font-size: 12px; }
        .lang-active { border-color: var(--neon); color: var(--neon); background: rgba(0,255,255,0.1); }
        
        .best-score { color: #888; margin-bottom: 20px; font-size: 14px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="ad-banner">ADVERTISEMENT - GOOGLE ADMOB PLACEHOLDER</div>

    <div class="lang-selector">
        <button id="l-es" class="lang-btn lang-active" onclick="setLanguage('es')">ESP</button>
        <button id="l-en" class="lang-btn" onclick="setLanguage('en')">ENG</button>
    </div>

    <canvas id="game"></canvas>

    <div id="ui-layer">
        <!-- MENU PRINCIPAL -->
        <div id="menu-main" class="menu-box" style="display: block;">
            <h1>VOID</h1>
            <div class="best-score">BEST: <span id="val-best">0</span></div>
            <button class="btn btn-main" onclick="showMenu('menu-play')">START</button>
            <button class="btn" onclick="showMenu('menu-opts')">OPTIONS</button>
            <button class="btn btn-disabled">STORE (COMING SOON)</button>
        </div>

        <!-- MODO DE JUEGO -->
        <div id="menu-play" class="menu-box">
            <h2 style="color:var(--neon); margin-bottom:20px;">MODES</h2>
            <button class="btn btn-main" onclick="startGame()">INFINITE MODE</button>
            <button class="btn btn-disabled">LEVELS (COMING SOON)</button>
            <button class="btn" onclick="showMenu('menu-main')" style="border-color:#555; color:#888;">BACK</button>
        </div>

        <!-- OPCIONES -->
        <div id="menu-opts" class="menu-box">
            <h2 style="color:var(--neon); margin-bottom:20px;">OPTIONS</h2>
            <button class="btn" onclick="alert('Sound: ON')">SOUND: ON</button>
            <button class="btn" onclick="alert('Haptic: ON')">VIBRATION: ON</button>
            <button class="btn" onclick="showMenu('menu-main')">BACK</button>
        </div>

        <!-- MUERTE -->
        <div id="menu-death" class="menu-box">
            <h2 style="color:var(--pink)">VOIDED</h2>
            <p style="font-size:24px; margin: 10px 0;">SCORE: <span id="val-score">0</span></p>
            <button class="btn btn-main" onclick="startGame()">RETRY</button>
            <button class="btn" onclick="showMenu('menu-main')">MENU</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    let gameActive = false, score = 0, frame = 0, angle = 0;
    let baseSpeed = 4; // Velocidad inicial
    let player, obstacles = [], stars = [], trail = [];
    let highScore = localStorage.getItem('void_best') || 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        for(let i=0; i<50; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, v: Math.random()*0.5 + 0.1});
    }
    window.addEventListener('resize', resize);
    resize();

    function showMenu(id) {
        document.querySelectorAll('.menu-box').forEach(m => m.style.display = 'none');
        if(id !== 'none') { document.getElementById(id).style.display = 'block'; gameActive = false; }
        else { gameActive = true; }
    }

    function startGame() {
        player = { x: canvas.width * 0.15, y: canvas.height/2, size: 26, vy: 0, gravity: 0.55, jump: -8.5 };
        obstacles = []; trail = []; score = 0; frame = 0; angle = 0; baseSpeed = 4;
        showMenu('none');
    }

    function createObstacle() {
        const type = Math.floor(Math.random() * 4);
        const w = 65, gap = 175;
        
        switch(type) {
            case 0: // TOP
                obstacles.push({ x: canvas.width, y: 0, w: w, h: Math.random()*250 + 80, p: false });
                break;
            case 1: // BOTTOM
                let h = Math.random()*250 + 80;
                obstacles.push({ x: canvas.width, y: canvas.height - h, w: w, h: h, p: false });
                break;
            case 2: // MIDDLE
                obstacles.push({ x: canvas.width, y: canvas.height/2 - 60, w: w, h: 120, p: false });
                break;
            case 3: // DOORS
                let wallH = Math.random() * (canvas.height - gap - 120) + 60;
                obstacles.push({ x: canvas.width, y: 0, w: w, h: wallH, p: false });
                obstacles.push({ x: canvas.width, y: wallH + gap, w: w, h: canvas.height, p: false });
                break;
        }
    }

    function loop() {
        // Fondo
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        stars.forEach(s => {
            ctx.fillStyle = "rgba(255,255,255,0.5)";
            ctx.fillRect(s.x, s.y, s.s, s.s);
            if(gameActive) s.x -= s.v * (baseSpeed/4);
            if(s.x < 0) s.x = canvas.width;
        });

        if (gameActive || document.getElementById('menu-death').style.display === 'block') {
            if(gameActive) {
                frame++;
                angle += 0.12; 
                trail.push({x: player.x, y: player.y, a: angle});
                if(trail.length > 18) trail.shift();
                
                // Generar obstáculos según velocidad
                let spawnRate = Math.max(60, 100 - (score * 2));
                if(frame % Math.floor(spawnRate) === 0) createObstacle();
            }

            // Estela Pro
            trail.forEach((t, i) => {
                ctx.save();
                ctx.translate(t.x + 13, t.y + 13);
                ctx.rotate(t.a);
                ctx.fillStyle = `rgba(0, 255, 255, ${i/40})`;
                ctx.fillRect(-13, -13, 26, 26);
                ctx.restore();
            });

            // Player Pro
            ctx.save();
            ctx.translate(player.x + 13, player.y + 13);
            ctx.rotate(angle);
            ctx.shadowBlur = 20; ctx.shadowColor = "#00ffff";
            ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 3;
            ctx.strokeRect(-13, -13, 26, 26);
            ctx.fillStyle = "white";
            ctx.fillRect(-6, -6, 12, 12);
            ctx.restore();

            // Obstáculos Pro
            obstacles.forEach((o, i) => {
                if(gameActive) o.x -= baseSpeed;
                ctx.shadowBlur = 15; ctx.shadowColor = "#ff00ff";
                ctx.fillStyle = "rgba(255, 0, 255, 0.1)";
                ctx.strokeStyle = "#ff00ff";
                ctx.lineWidth = 2;
                ctx.fillRect(o.x, o.y, o.w, o.h);
                ctx.strokeRect(o.x, o.y, o.w, o.h);
                
                if (gameActive && player.x + 2 < o.x + o.w && player.x + 24 > o.x && player.y + 2 < o.y + o.h && player.y + 24 > o.y) endGame();
                
                if (gameActive && !o.p && o.x < player.x) { 
                    o.p = true; 
                    score++; 
                    baseSpeed += 0.15; // <--- INCREMENTO DE VELOCIDAD PROGRESIVA
                }
            });
            if(obstacles.length > 20) obstacles.splice(0,1);
            
            ctx.shadowBlur = 0;
            ctx.fillStyle = "rgba(255,255,255,0.1)";
            ctx.font = "bold 100px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(score, canvas.width/2, canvas.height/2 + 40);
        }

        if(gameActive) {
            player.vy += player.gravity;
            player.y += player.vy;
            if (player.y > canvas.height || player.y < 0) endGame();
        }
        requestAnimationFrame(loop);
    }

    function endGame() {
        gameActive = false;
        if(score > highScore) { highScore = score; localStorage.setItem('void_best', highScore); }
        document.getElementById('val-best').innerText = highScore;
        document.getElementById('val-score').innerText = score;
        showMenu('menu-death');
    }

    window.addEventListener('pointerdown', () => { if(gameActive) player.vy = player.jump; });
    document.getElementById('val-best').innerText = highScore;
    loop();
</script>
</body>
</html>
