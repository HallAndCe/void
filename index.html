<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID - NEON</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; transition: filter 0.5s ease; }
        .blurred { filter: blur(10px) brightness(0.3); }
        #ui-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: white; display: none; width: 85%; z-index: 10;
        }
        #ui-overlay img { max-width: 140px; margin-bottom: 15px; border-radius: 20px; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui-overlay">
        <img id="logo" src="logo.png" alt="Logo">
        <h1 id="final-score">SCORE: 0</h1>
        <p id="high-score">BEST: 0</p>
        <p style="color: #aaa; margin-top: 20px;" id="instruction-retry">Tap to try again</p>
    </div>

<script>
    const lang = navigator.language.startsWith('es') ? 'es' : 'en';
    const texts = {
        es: { start: 'TOCA PARA EMPEZAR', score: 'PUNTOS', best: 'RÉCORD', retry: 'Toca para reintentar' },
        en: { start: 'TAP TO START', score: 'SCORE', best: 'BEST', retry: 'Tap to try again' }
    };

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui-overlay');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    let highScore = localStorage.getItem('voidHighScore') || 0;
    let gameStarted = false;
    let gameOver = false;
    let gameSpeed = 5.5;
    let trail = []; // Array para la estela

    const player = {
        x: canvas.width * 0.2,
        y: canvas.height / 2,
        size: 32,
        vy: 0,
        speed: 7.5,
        color: '#00ffff',
        angle: 0 // Para la rotación
    };

    let obstacles = [];
    let frame = 0;

    function spawnObstacle() {
        const h = Math.random() * (canvas.height * 0.3) + (canvas.height * 0.2);
        const isTop = Math.random() > 0.5;
        obstacles.push({
            x: canvas.width + 100,
            y: isTop ? 0 : canvas.height - h,
            w: 65,
            h: h,
            color: '#111',
            edge: isTop ? '#ff00ff' : '#00ffff'
        });
    }

    function resetGame() {
        score = 0; gameSpeed = 5.5; obstacles = []; trail = []; frame = 0;
        gameOver = false; gameStarted = false;
        player.y = canvas.height / 2; player.vy = 0; player.angle = 0;
        ui.style.display = 'none';
        canvas.classList.remove('blurred');
    }

    function update() {
        if (!gameStarted || gameOver) return;
        frame++;
        player.y += player.vy;
        player.angle += 0.15; // Rotación constante

        // Guardar posición para la estela
        trail.push({ x: player.x, y: player.y, alpha: 1.0, color: player.color, angle: player.angle });
        if (trail.length > 15) trail.shift(); // Longitud de la estela

        if (player.y < 0 || player.y + player.size > canvas.height) gameOver = true, endGame();

        if (frame % Math.max(35, Math.floor(75 - score * 0.4)) === 0) spawnObstacle();

        obstacles.forEach((obs, index) => {
            obs.x -= (gameSpeed + score * 0.18);
            if (player.x < obs.x + obs.w && player.x + player.size > obs.x &&
                player.y < obs.y + obs.h && player.y + player.size > obs.y) endGame();
            if (obs.x + obs.w < 0) { obstacles.splice(index, 1); score++; }
        });
    }

    function endGame() {
        gameOver = true;
        if (score > highScore) { highScore = score; localStorage.setItem('voidHighScore', highScore); }
        document.getElementById('final-score').innerText = `${texts[lang].score}: ${score}`;
        document.getElementById('high-score').innerText = `${texts[lang].best}: ${highScore}`;
        ui.style.display = 'block';
        canvas.classList.add('blurred');
    }

    function draw() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Score de fondo
        ctx.fillStyle = 'rgba(255,255,255,0.03)';
        ctx.font = 'bold 200px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(score, canvas.width/2, canvas.height/2 + 70);

        // DIBUJAR ESTELA (TRAIL)
        trail.forEach((t, i) => {
            ctx.save();
            ctx.translate(t.x + player.size/2, t.y + player.size/2);
            ctx.rotate(t.angle);
            ctx.globalAlpha = i / trail.length * 0.5; // Se desvanece
            ctx.strokeStyle = t.color;
            ctx.lineWidth = 2;
            ctx.strokeRect(-player.size/2, -player.size/2, player.size, player.size);
            ctx.restore();
        });

        // DIBUJAR JUGADOR (NÚCLEO NEÓN)
        ctx.save();
        ctx.translate(player.x + player.size/2, player.y + player.size/2);
        ctx.rotate(player.angle);
        
        // Brillo exterior
        ctx.shadowBlur = 20;
        ctx.shadowColor = player.color;
        
        // Relleno principal
        ctx.fillStyle = player.color;
        ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
        
        // Núcleo blanco interno para efecto "guay"
        ctx.fillStyle = '#fff';
        ctx.fillRect(-player.size/4, -player.size/4, player.size/2, player.size/2);
        ctx.restore();
        ctx.shadowBlur = 0;

        // Obstáculos
        obstacles.forEach(obs => {
            ctx.fillStyle = obs.color;
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            ctx.strokeStyle = obs.edge;
            ctx.lineWidth = 3;
            ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
        });

        if (!gameStarted && !gameOver) {
            ctx.fillStyle = '#fff'; ctx.font = 'bold 22px sans-serif';
            ctx.fillText(texts[lang].start, canvas.width/2, canvas.height/2 + 200);
        }

        update();
        requestAnimationFrame(draw);
    }

    window.addEventListener('pointerdown', () => {
        if (gameOver) resetGame();
        else if (!gameStarted) { gameStarted = true; player.vy = player.speed; }
        else { player.vy *= -1; player.color = player.vy > 0 ? '#00ffff' : '#ff00ff'; }
    });

    draw();
</script>
</body>
</html>
