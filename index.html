<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID - God Mode Edition (Fixed)</title>
    <style>
        :root { --neon: #00ffff; --pink: #ff00ff; }
        body { margin: 0; background: #020205; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; transition: background 0.5s; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 10; }
        .menu-box { text-align: center; background: rgba(0,0,0,0.95); padding: 30px; border-radius: 25px; border: 2px solid #333; backdrop-filter: blur(15px); display: none; pointer-events: auto; width: 85%; max-width: 320px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        h1 { font-size: 50px; letter-spacing: 12px; margin: 0 0 20px 0; text-shadow: 0 0 20px var(--neon); color: var(--neon); }
        .btn { width: 100%; margin: 12px 0; padding: 18px; background: #111; color: white; border: 1px solid #444; border-radius: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; }
        .btn-main { border: 2px solid var(--pink); box-shadow: 0 0 15px rgba(255,0,255,0.2); }
        .slider-container { margin: 20px 0; text-align: left; }
        .slider-label { font-size: 12px; color: var(--neon); text-transform: uppercase; }
        input[type=range] { width: 100%; margin-top: 10px; cursor: pointer; accent-color: var(--neon); }
        .lang-selector { position: absolute; top: 20px; right: 20px; pointer-events: auto; z-index: 20; }
        .lang-btn { background: rgba(255,255,255,0.05); border: 1px solid #444; color: #888; padding: 6px 12px; border-radius: 8px; margin-left: 5px; cursor: pointer; }
        .lang-active { border-color: var(--neon); color: var(--neon); }
    </style>
</head>
<body>

    <div class="lang-selector">
        <button id="l-es" class="lang-btn lang-active" onclick="setLanguage('es')">ESP</button>
        <button id="l-en" class="lang-btn" onclick="setLanguage('en')">ENG</button>
    </div>

    <canvas id="game"></canvas>

    <div id="ui-layer">
        <div id="menu-main" class="menu-box" style="display: block;">
            <h1>VOID</h1>
            <div style="color:#888; margin-bottom:20px;"><span id="t-best">RÉCORD</span>: <span id="val-best">0</span></div>
            <button class="btn btn-main" id="b-start" onclick="showMenu('menu-play')">INICIAR</button>
            <button class="btn" id="b-opts" onclick="showMenu('menu-opts')">OPCIONES</button>
        </div>

        <div id="menu-play" class="menu-box">
            <h2 id="t-modes" style="color:var(--neon)">MODOS</h2>
            <button class="btn btn-main" id="b-inf" onclick="startGame()">MODO INFINITO</button>
            <button class="btn" id="b-back" onclick="showMenu('menu-main')">VOLVER</button>
        </div>

        <div id="menu-opts" class="menu-box">
            <h2 id="t-opts-title" style="color:var(--neon)">OPCIONES</h2>
            <div class="slider-container"><div class="slider-label" id="t-sound">SONIDO</div><input type="range"></div>
            <div class="slider-container"><div class="slider-label" id="t-vib">VIBRACIÓN</div><input type="range"></div>
            <button class="btn" id="b-back2" onclick="showMenu('menu-main')">VOLVER</button>
        </div>

        <div id="menu-death" class="menu-box">
            <h2 id="t-over" style="color:var(--pink)">VOIDED</h2>
            <p style="font-size:24px;"><span id="t-score">PUNTOS</span>: <span id="val-score">0</span></p>
            <button class="btn btn-main" id="b-retry" onclick="startGame()">REINTENTAR</button>
            <button class="btn" id="b-menu" onclick="showMenu('menu-main')">MENÚ</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const langData = {
        es: { best: "RÉCORD", start: "INICIAR", opts: "OPCIONES", modes: "MODOS", inf: "MODO INFINITO", back: "VOLVER", sound: "SONIDO", vib: "VIBRACIÓN", over: "VOIDED", score: "PUNTOS", retry: "REINTENTAR", menu: "MENÚ" },
        en: { best: "BEST", start: "START", opts: "OPTIONS", modes: "MODES", inf: "INFINITE", back: "BACK", sound: "SOUND", vib: "VIBRATION", over: "VOIDED", score: "SCORE", retry: "RETRY", menu: "MENU" }
    };

    function setLanguage(l) {
        const t = langData[l];
        for(let id in t) { 
            let el = document.getElementById('t-'+id) || document.getElementById('b-'+id);
            if(el) el.innerText = t[id];
        }
        document.getElementById('l-es').className = l === 'es' ? 'lang-btn lang-active' : 'lang-btn';
        document.getElementById('l-en').className = l === 'en' ? 'lang-btn lang-active' : 'lang-btn';
    }

    let gameActive = false, score = 0, frame = 0, angle = 0;
    let baseSpeed = 5; 
    let player, obstacles = [], stars = [], trail = [], particles = [];
    let highScore = localStorage.getItem('void_best') || 0;
    let lastGateY = 300; // Para asegurar que el juego sea posible físicamente

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        for(let i=0; i<60; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, v: Math.random()*1});
    }
    window.addEventListener('resize', resize);
    resize();

    function showMenu(id) {
        document.querySelectorAll('.menu-box').forEach(m => m.style.display = 'none');
        if(id !== 'none') document.getElementById(id).style.display = 'block';
        gameActive = (id === 'none');
    }

    function startGame() {
        player = { x: canvas.width * 0.15, y: canvas.height/2, size: 26, vy: 0, gravity: 0.6, jump: -9 };
        obstacles = []; trail = []; particles = []; score = 0; frame = 0; baseSpeed = 5;
        lastGateY = canvas.height / 2;
        document.body.style.background = "#020205";
        showMenu('none');
    }

    function createExplosion(x, y, color) {
        for(let i=0; i<40; i++) {
            particles.push({ x: x, y: y, vx: (Math.random()-0.5)*20, vy: (Math.random()-0.5)*20, size: Math.random()*5, life: 1, color: color });
        }
    }

    function createObstacle() {
        const w = 75;
        const gap = Math.max(130, 200 - (score * 1.3)); 
        
        // ALGORITMO DE FÍSICA POSIBLE: Limita la diferencia de altura respecto al anterior
        let minY = Math.max(50, lastGateY - 220);
        let maxY = Math.min(canvas.height - gap - 50, lastGateY + 220);
        let wallH = Math.random() * (maxY - minY) + minY;
        
        lastGateY = wallH; // Guardamos para el siguiente

        obstacles.push({ x: canvas.width, y: 0, w: w, h: wallH, p: false });
        obstacles.push({ x: canvas.width, y: wallH + gap, w: w, h: canvas.height, p: false }); 
    }

    function loop() {
        if(gameActive && score >= 100) {
            ctx.fillStyle = "white";
            document.body.style.background = "white";
        } else {
            ctx.fillStyle = '#020205';
        }
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if(gameActive && score >= 30) {
            let shake = score >= 100 ? 8 : 4;
            ctx.save();
            ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
        }

        stars.forEach(s => {
            ctx.fillStyle = score >= 100 ? "black" : "white";
            ctx.fillRect(s.x, s.y, s.s, s.s);
            if(gameActive) s.x -= s.v * (baseSpeed/5);
            if(s.x < 0) s.x = canvas.width;
        });

        if(gameActive && score >= 75 && frame % 2 === 0) {
            particles.push({ x: player.x, y: player.y+13, vx: -Math.random()*5, vy: (Math.random()-0.5)*3, size: 3, life: 1, color: "#00ffff" });
        }

        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            ctx.fillStyle = score >= 100 ? `rgba(0,0,0,${p.life})` : `rgba(0, 255, 255, ${p.life})`;
            ctx.fillRect(p.x, p.y, p.size, p.size);
            if(p.life <= 0) particles.splice(i, 1);
        });

        if (gameActive || document.getElementById('menu-death').style.display === 'block') {
            if(gameActive) {
                frame++; angle += 0.15;
                trail.push({x: player.x, y: player.y, a: angle});
                let maxTrail = score >= 50 ? 60 : 25;
                if(trail.length > maxTrail) trail.shift();
                if(frame % Math.max(30, 80 - score) === 0) createObstacle();
            }

            trail.forEach((t, i) => {
                ctx.save();
                ctx.translate(t.x + 13, t.y + 13);
                ctx.rotate(t.a);
                let op = i / (score >= 50 ? 80 : 40);
                ctx.strokeStyle = score >= 100 ? `rgba(0,0,0,${op})` : `rgba(0, 255, 255, ${op})`;
                ctx.strokeRect(-13, -13, 26, 26);
                ctx.restore();
            });

            if(gameActive) {
                ctx.save();
                ctx.translate(player.x + 13, player.y + 13);
                if(score >= 50 && frame % 10 < 2) ctx.translate((Math.random()-0.5)*15, 0);
                ctx.rotate(angle);
                if(score >= 10) {
                    ctx.shadowBlur = score >= 100 ? 50 : 30; 
                    ctx.shadowColor = score >= 100 ? "black" : "#00ffff";
                    ctx.strokeStyle = score >= 100 ? "black" : "#00ffff"; 
                    ctx.lineWidth = 4;
                    ctx.strokeRect(-13, -13, 26, 26);
                }
                if(score >= 25) {
                    for(let i=0; i<4; i++) {
                        ctx.beginPath(); ctx.strokeStyle = score >= 100 ? "black" : "white";
                        ctx.moveTo(0,0); ctx.lineTo((Math.random()-0.5)*80, (Math.random()-0.5)*80);
                        ctx.stroke();
                    }
                }
                ctx.fillStyle = score >= 100 ? "black" : "white";
                ctx.fillRect(-6, -6, 12, 12);
                ctx.restore();
            }

            obstacles.forEach((o, i) => {
                if(gameActive) o.x -= baseSpeed;
                let ox = o.x;
                if(score >= 50 && frame % 15 < 2) ox += (Math.random()-0.5)*10;
                ctx.shadowBlur = score >= 25 ? 20 : 0; ctx.shadowColor = "#ff00ff";
                ctx.fillStyle = score >= 100 ? "rgba(0,0,0,0.8)" : "rgba(255, 0, 255, 0.2)";
                ctx.strokeStyle = score >= 100 ? "black" : "#ff00ff";
                ctx.lineWidth = 3;
                ctx.fillRect(ox, o.y, o.w, o.h);
                ctx.strokeRect(ox, o.y, o.w, o.h);
                
                if (gameActive && player.x + 6 < ox + o.w && player.x + 20 > ox && player.y + 6 < o.y + o.h && player.y + 20 > o.y) {
                    createExplosion(player.x + 13, player.y + 13, "#00ffff");
                    endGame();
                }
                if (gameActive && !o.p && ox < player.x) { o.p = true; score++; baseSpeed += 0.25; }
            });
            if(obstacles.length > 25) obstacles.splice(0,1);
            
            if(gameActive && score >= 30) ctx.restore();
            ctx.fillStyle = score >= 100 ? "rgba(0,0,0,0.1)" : "rgba(255,255,255,0.05)";
            ctx.font = "bold 150px sans-serif"; ctx.textAlign = "center";
            ctx.fillText(score, canvas.width/2, canvas.height/2 + 50);
        }

        if(gameActive) {
            player.vy += player.gravity; player.y += player.vy;
            if (player.y > canvas.height || player.y < 0) endGame();
        }
        requestAnimationFrame(loop);
    }

    function endGame() {
        gameActive = false;
        if(score > highScore) { highScore = score; localStorage.setItem('void_best', highScore); }
        document.getElementById('val-best').innerText = highScore;
        document.getElementById('val-score').innerText = score;
        showMenu('menu-death');
    }

    window.addEventListener('pointerdown', (e) => { 
        if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT' && gameActive) player.vy = player.jump; 
    });

    document.getElementById('val-best').innerText = highScore;
    setLanguage('es');
    loop();
</script>
</body>
</html>
