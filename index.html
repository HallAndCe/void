<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; touch-action: none; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor: '#000000',
    physics: { default: 'arcade', arcade: { gravity: { y: 0 } } }, // CERO GRAVEDAD para evitar errores
    scene: { preload: preload, create: create, update: update }
};

let player, obstacles, score = 0, scoreText, isGameOver = false, gameStarted = false;
let playerSpeed = 500; // Velocidad fija
const game = new Phaser.Game(config);

function preload() {}

function create() {
    const w = window.innerWidth;
    const h = window.innerHeight;

    // El jugador empieza en el centro
    player = this.add.rectangle(w * 0.2, h / 2, 35, 35, 0x00ffff);
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true);
    
    obstacles = this.physics.add.group();

    let startText = this.add.text(w/2, h/2, 'TAP TO START', { fontSize: '32px', fill: '#fff' }).setOrigin(0.5);

    this.input.on('pointerdown', () => {
        if (!gameStarted) {
            gameStarted = true;
            startText.destroy();
            player.body.setVelocityY(playerSpeed); // Empieza bajando
            this.time.addEvent({ delay: 1200, callback: addObstacle, callbackScope: this, loop: true });
        } else if (!isGameOver) {
            // INVERSIÓN DE VELOCIDAD PURA (Sin gravedad que lo frene)
            let newVelocity = player.body.velocity.y * -1;
            player.body.setVelocityY(newVelocity);
            player.setFillStyle(newVelocity > 0 ? 0x00ffff : 0xff00ff);
        }
    });

    scoreText = this.add.text(w/2, 80, '0', { fontSize: '80px', fill: '#fff' }).setOrigin(0.5).setAlpha(0.2);
}

function addObstacle() {
    if (isGameOver) return;
    const w = window.innerWidth;
    const h = window.innerHeight;
    const isTop = Math.random() > 0.5;
    const obsHeight = h * 0.35;
    const py = isTop ? 0 : h - obsHeight;
    
    let obs = this.add.rectangle(w + 100, py + (obsHeight/2), 60, obsHeight, 0xffffff, 0.1);
    obs.setStrokeStyle(3, 0xffffff);
    this.physics.add.existing(obs);
    obs.body.setVelocityX(-400 - (score * 5));
    obstacles.add(obs);
}

function update() {
    if (isGameOver) return;

    // Colisión
    this.physics.add.overlap(player, obstacles, () => {
        isGameOver = true;
        this.cameras.main.shake(200, 0.03);
        setTimeout(() => { location.reload(); }, 500);
    });

    // Limpieza de obstáculos y puntos
    obstacles.children.iterate(child => {
        if (child && child.x < -100) {
            child.destroy();
            score++;
            scoreText.setText(score);
        }
    });
}
</script>
</body>
</html>
