<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID - Epic Edition</title>
    <style>
        :root { --neon: #00ffff; --pink: #ff00ff; }
        body { margin: 0; background: #020205; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 10; }
        
        #ad-banner { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50px; 
            background: #111; border-top: 1px solid #333; display: flex; 
            align-items: center; justify-content: center; font-size: 10px; color: #444; z-index: 100;
        }

        .menu-box { text-align: center; background: rgba(0,0,0,0.95); padding: 30px; border-radius: 25px; border: 2px solid #333; backdrop-filter: blur(15px); display: none; pointer-events: auto; width: 85%; max-width: 320px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        
        h1 { font-size: 50px; letter-spacing: 12px; margin: 0 0 20px 0; text-shadow: 0 0 20px var(--neon); color: var(--neon); }
        
        .btn { width: 100%; margin: 12px 0; padding: 18px; background: #111; color: white; border: 1px solid #444; border-radius: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; transition: 0.3s; }
        .btn-main { border: 2px solid var(--pink); box-shadow: 0 0 15px rgba(255,0,255,0.2); }
        .btn-disabled { opacity: 0.4; font-size: 10px; cursor: default; }
        
        .slider-container { margin: 20px 0; text-align: left; }
        .slider-label { font-size: 12px; color: var(--neon); text-transform: uppercase; letter-spacing: 1px; }
        input[type=range] { width: 100%; margin-top: 10px; cursor: pointer; accent-color: var(--neon); }

        .lang-selector { position: absolute; top: 20px; right: 20px; pointer-events: auto; z-index: 20; }
        .lang-btn { background: rgba(255,255,255,0.05); border: 1px solid #444; color: #888; padding: 6px 12px; border-radius: 8px; margin-left: 5px; cursor: pointer; font-size: 12px; }
        .lang-active { border-color: var(--neon); color: var(--neon); background: rgba(0,255,255,0.1); }
    </style>
</head>
<body>

    <div id="ad-banner">ADVERTISEMENT - GOOGLE ADMOB PLACEHOLDER</div>

    <div class="lang-selector">
        <button id="l-es" class="lang-btn lang-active" onclick="setLanguage('es')">ESP</button>
        <button id="l-en" class="lang-btn" onclick="setLanguage('en')">ENG</button>
    </div>

    <canvas id="game"></canvas>

    <div id="ui-layer">
        <!-- MENU PRINCIPAL -->
        <div id="menu-main" class="menu-box" style="display: block;">
            <h1>VOID</h1>
            <div style="color:#888; margin-bottom:20px;"><span id="t-best">RÉCORD</span>: <span id="val-best">0</span></div>
            <button class="btn btn-main" id="b-start" onclick="showMenu('menu-play')">INICIAR</button>
            <button class="btn" id="b-opts" onclick="showMenu('menu-opts')">OPCIONES</button>
            <button class="btn btn-disabled" id="b-store">TIENDA (PRÓXIMAMENTE)</button>
        </div>

        <!-- MODO DE JUEGO -->
        <div id="menu-play" class="menu-box">
            <h2 id="t-modes" style="color:var(--neon)">MODOS</h2>
            <button class="btn btn-main" id="b-inf" onclick="startGame()">MODO INFINITO</button>
            <button class="btn btn-disabled" id="b-levels">NIVELES (PRONTO)</button>
            <button class="btn" id="b-back" onclick="showMenu('menu-main')">VOLVER</button>
        </div>

        <!-- OPCIONES -->
        <div id="menu-opts" class="menu-box">
            <h2 id="t-opts-title" style="color:var(--neon)">OPCIONES</h2>
            <div class="slider-container">
                <div class="slider-label" id="t-sound">SONIDO</div>
                <input type="range" min="0" max="100" value="80">
            </div>
            <div class="slider-container">
                <div class="slider-label" id="t-vib">VIBRACIÓN</div>
                <input type="range" min="0" max="100" value="50">
            </div>
            <button class="btn" id="b-back2" onclick="showMenu('menu-main')">VOLVER</button>
        </div>

        <!-- MUERTE -->
        <div id="menu-death" class="menu-box">
            <h2 id="t-over" style="color:var(--pink)">VOIDED</h2>
            <p style="font-size:24px;"><span id="t-score">PUNTOS</span>: <span id="val-score">0</span></p>
            <button class="btn btn-main" id="b-retry" onclick="startGame()">REINTENTAR</button>
            <button class="btn" id="b-menu" onclick="showMenu('menu-main')">MENÚ</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    const langData = {
        es: { best: "RÉCORD", start: "INICIAR", opts: "OPCIONES", store: "TIENDA (PRONTO)", modes: "MODOS", inf: "MODO INFINITO", back: "VOLVER", sound: "SONIDO", vib: "VIBRACIÓN", over: "VOIDED", score: "PUNTOS", retry: "REINTENTAR", menu: "MENÚ" },
        en: { best: "BEST", start: "START", opts: "OPTIONS", store: "STORE (SOON)", modes: "MODES", inf: "INFINITE MODE", back: "BACK", sound: "SOUND", vib: "VIBRATION", over: "VOIDED", score: "SCORE", retry: "RETRY", menu: "MENU" }
    };

    function setLanguage(l) {
        const t = langData[l];
        document.getElementById('t-best').innerText = t.best;
        document.getElementById('b-start').innerText = t.start;
        document.getElementById('b-opts').innerText = t.opts;
        document.getElementById('b-store').innerText = t.store;
        document.getElementById('t-modes').innerText = t.modes;
        document.getElementById('b-inf').innerText = t.inf;
        document.getElementById('b-back').innerText = t.back;
        document.getElementById('b-back2').innerText = t.back;
        document.getElementById('t-opts-title').innerText = t.opts;
        document.getElementById('t-sound').innerText = t.sound;
        document.getElementById('t-vib').innerText = t.vib;
        document.getElementById('t-over').innerText = t.over;
        document.getElementById('t-score').innerText = t.score;
        document.getElementById('b-retry').innerText = t.retry;
        document.getElementById('b-menu').innerText = t.menu;
        document.getElementById('l-es').className = l === 'es' ? 'lang-btn lang-active' : 'lang-btn';
        document.getElementById('l-en').className = l === 'en' ? 'lang-btn lang-active' : 'lang-btn';
    }

    let gameActive = false, score = 0, frame = 0, angle = 0;
    let baseSpeed = 5; 
    let player, obstacles = [], stars = [], trail = [], particles = [];
    let highScore = localStorage.getItem('void_best') || 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        for(let i=0; i<60; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, v: Math.random()*1});
    }
    window.addEventListener('resize', resize);
    resize();

    function showMenu(id) {
        document.querySelectorAll('.menu-box').forEach(m => m.style.display = 'none');
        if(id !== 'none') { document.getElementById(id).style.display = 'block'; gameActive = false; }
        else { gameActive = true; }
    }

    function startGame() {
        player = { x: canvas.width * 0.15, y: canvas.height/2, size: 26, vy: 0, gravity: 0.6, jump: -9 };
        obstacles = []; trail = []; particles = []; score = 0; frame = 0; baseSpeed = 5;
        showMenu('none');
    }

    function createExplosion(x, y, color) {
        for(let i=0; i<30; i++) {
            particles.push({ x: x, y: y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, size: Math.random()*4, life: 1, color: color });
        }
    }

    function createObstacle() {
        const type = Math.floor(Math.random() * 4);
        const w = 70;
        const gap = Math.max(135, 190 - (score * 1.5)); 
        switch(type) {
            case 0: obstacles.push({ x: canvas.width, y: 0, w: w, h: Math.random()*300 + 100, p: false }); break;
            case 1: let h = Math.random()*300 + 100; obstacles.push({ x: canvas.width, y: canvas.height - h, w: w, h: h, p: false }); break;
            case 2: obstacles.push({ x: canvas.width, y: canvas.height/2 - 70, w: w, h: 140, p: false }); break;
            case 3: 
                let wallH = Math.random() * (canvas.height - gap - 100) + 50;
                obstacles.push({ x: canvas.width, y: 0, w: w, h: wallH, p: false });
                obstacles.push({ x: canvas.width, y: wallH + gap, w: w, h: canvas.height, p: false }); 
                break;
        }
    }

    function loop() {
        ctx.fillStyle = '#020205';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // EFECTO SACUDIDA (Score > 30)
        if(gameActive && score >= 30) {
            ctx.save();
            ctx.translate((Math.random()-0.5)*4, (Math.random()-0.5)*4);
        }

        stars.forEach(s => {
            ctx.fillStyle = "rgba(255,255,255,0.4)";
            ctx.fillRect(s.x, s.y, s.s, s.s);
            if(gameActive) s.x -= s.v * (baseSpeed/5);
            if(s.x < 0) s.x = canvas.width;
        });

        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            ctx.fillStyle = `rgba(0, 255, 255, ${p.life})`;
            ctx.fillRect(p.x, p.y, p.size, p.size);
            if(p.life <= 0) particles.splice(i, 1);
        });

        if (gameActive || document.getElementById('menu-death').style.display === 'block') {
            if(gameActive) {
                frame++;
                angle += 0.15;
                trail.push({x: player.x, y: player.y, a: angle});
                let maxTrail = score >= 30 ? 50 : 20;
                if(trail.length > maxTrail) trail.shift();
                if(frame % Math.max(35, 80 - score) === 0) createObstacle();
            }

            // ESTELA PROGRESIVA
            trail.forEach((t, i) => {
                ctx.save();
                ctx.translate(t.x + 13, t.y + 13);
                ctx.rotate(t.a);
                let opacity = i / (score >= 30 ? 60 : 40);
                ctx.strokeStyle = `rgba(0, 255, 255, ${opacity})`;
                ctx.strokeRect(-13, -13, 26, 26);
                ctx.restore();
            });

            // JUGADOR CON EVOLUCIÓN
            if(gameActive) {
                ctx.save();
                ctx.translate(player.x + 13, player.y + 13);
                ctx.rotate(angle);
                
                // Nivel 1: Aura (10 pts)
                if(score >= 10) {
                    ctx.shadowBlur = 30; ctx.shadowColor = "#00ffff";
                    ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 4;
                    ctx.strokeRect(-13, -13, 26, 26);
                } else {
                    ctx.strokeStyle = "white"; ctx.lineWidth = 2;
                    ctx.strokeRect(-13, -13, 26, 26);
                }
                
                // Nivel 2: Rayos (20 pts)
                if(score >= 20) {
                    for(let i=0; i<3; i++) {
                        ctx.beginPath(); ctx.strokeStyle = "white"; 
                        ctx.moveTo(0,0); ctx.lineTo((Math.random()-0.5)*70, (Math.random()-0.5)*70);
                        ctx.stroke();
                    }
                }

                ctx.fillStyle = "white";
                ctx.fillRect(-6, -6, 12, 12);
                ctx.restore();
            }

            // OBSTÁCULOS
            obstacles.forEach((o, i) => {
                if(gameActive) o.x -= baseSpeed;
                ctx.shadowBlur = score >= 20 ? 20 : 0; ctx.shadowColor = "#ff00ff";
                ctx.fillStyle = "rgba(255, 0, 255, 0.2)";
                ctx.strokeStyle = "#ff00ff";
                ctx.lineWidth = 3;
                ctx.fillRect(o.x, o.y, o.w, o.h);
                ctx.strokeRect(o.x, o.y, o.w, o.h);
                
                if (gameActive && player.x + 5 < o.x + o.w && player.x + 21 > o.x && player.y + 5 < o.y + o.h && player.y + 21 > o.y) {
                    createExplosion(player.x + 13, player.y + 13, "#00ffff");
                    endGame();
                }
                if (gameActive && !o.p && o.x < player.x) { o.p = true; score++; baseSpeed += 0.25; }
            });
            if(obstacles.length > 25) obstacles.splice(0,1);
            
            // PUNTUACIÓN GHOST
            if(gameActive && score >= 30) ctx.restore(); // Termina sacudida para el texto
            ctx.shadowBlur = 0;
            ctx.fillStyle = "rgba(255,255,255,0.05)";
            ctx.font = "bold 150px sans-serif"; ctx.textAlign = "center";
            ctx.fillText(score, canvas.width/2, canvas.height/2 + 50);
        }

        if(gameActive) {
            player.vy += player.gravity;
            player.y += player.vy;
            if (player.y > canvas.height || player.y < 0) {
                createExplosion(player.x+13, player.y+13, "#00ffff");
                endGame();
            }
        }
        requestAnimationFrame(loop);
    }

    function endGame() {
        gameActive = false;
        if(score > highScore) { highScore = score; localStorage.setItem('void_best', highScore); }
        document.getElementById('val-best').innerText = highScore;
        document.getElementById('val-score').innerText = score;
        showMenu('menu-death');
    }

    window.addEventListener('pointerdown', (e) => { 
        if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
            if(gameActive) player.vy = player.jump; 
        }
    });

    document.getElementById('val-best').innerText = highScore;
    setLanguage('es');
    loop();
</script>
</body>
</html>
