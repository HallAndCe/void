<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID - Profesional Edition</title>
    <style>
        :root { --neon: #00ffff; --pink: #ff00ff; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; }
        canvas { display: block; }

        /* Contenedor de Interfaz */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; z-index: 10;
        }

        /* Cajas de Menú */
        .menu-box {
            text-align: center; background: rgba(0,0,0,0.9); padding: 25px;
            border-radius: 20px; border: 2px solid #333; backdrop-filter: blur(10px);
            display: none; pointer-events: auto; width: 85%; max-width: 350px;
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
        }

        h1 { font-size: 45px; letter-spacing: 8px; margin: 10px 0; text-shadow: 0 0 15px var(--neon); }
        h2 { color: var(--neon); margin-top: 0; }

        /* Botones Profesionales */
        .btn {
            width: 100%; margin: 8px 0; padding: 12px;
            background: #111; color: white; border: 1px solid #444;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: 0.3s; text-transform: uppercase;
        }
        .btn:active { transform: scale(0.95); background: var(--neon); color: #000; }
        .btn-main { border: 2px solid var(--pink); box-shadow: 0 0 10px rgba(255,0,255,0.3); }
        
        /* Layout Tienda y Opciones */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-bar { background: #222; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; }
        
        input[type=range] { width: 100%; accent-color: var(--neon); }
    </style>
</head>
<body>

    <canvas id="game"></canvas>

    <div id="ui-layer">
        
        <!-- 1. MENÚ PRINCIPAL -->
        <div id="menu-main" class="menu-box" style="display: block;">
            <h1>VOID</h1>
            <div class="stat-bar">
                <span>🏆 <span id="val-best">0</span></span>
                <span>💰 <span id="val-coins">0</span></span>
            </div>
            <button class="btn btn-main" onclick="showMenu('menu-play')">JUGAR</button>
            <button class="btn" onclick="showMenu('menu-store')">TIENDA</button>
            <button class="btn" onclick="showMenu('menu-options')">OPCIONES</button>
        </div>

        <!-- 2. MENÚ SELECCIÓN MODO -->
        <div id="menu-play" class="menu-box">
            <h2>MODO DE JUEGO</h2>
            <button class="btn" onclick="startGame('infinito')">MODO INFINITO</button>
            <button class="btn" onclick="alert('Próximamente: 10 Niveles')">MODO NIVELES</button>
            <button class="btn" onclick="showMenu('menu-main')" style="color: var(--pink)">VOLVER</button>
        </div>

        <!-- 3. TIENDA -->
        <div id="menu-store" class="menu-box">
            <h2>TIENDA</h2>
            <p>Skins por mérito</p>
            <div class="grid-2">
                <button class="btn" style="font-size: 10px;" onclick="changeSkin('square')">CUADRADO</button>
                <button class="btn" style="font-size: 10px;" onclick="changeSkin('circle')">CÍRCULO</button>
            </div>
            <p style="color: gold;">Skins Premium (Pago)</p>
            <button class="btn" onclick="alert('Conectando con pasarela de pago...')">Skin Dorada (0.99€)</button>
            <button class="btn" onclick="showMenu('menu-main')" style="margin-top:10px;">VOLVER</button>
        </div>

        <!-- 4. OPCIONES -->
        <div id="menu-options" class="menu-box">
            <h2>OPCIONES</h2>
            <label>VOLUMEN MÚSICA</label>
            <input type="range" min="0" max="100" value="70">
            <br><br>
            <label>EFECTOS ESPECIALES</label>
            <input type="range" min="0" max="100" value="90">
            <button class="btn" onclick="showMenu('menu-main')" style="margin-top:20px;">GUARDAR</button>
        </div>

        <!-- 5. PANTALLA DE MUERTE -->
        <div id="menu-death" class="menu-box">
            <h2 id="death-score">PUNTOS: 0</h2>
            <button class="btn btn-main" onclick="startGame()">REINTENTAR</button>
            <button class="btn" onclick="showMenu('menu-main')">MENÚ</button>
        </div>

    </div>

<script>
    // --- LÓGICA DE NAVEGACIÓN (Lo que pediste) ---
    function showMenu(menuId) {
        // Cerramos todos los menús
        document.querySelectorAll('.menu-box').forEach(m => m.style.display = 'none');
        // Abrimos el que queremos
        document.getElementById(menuId).style.display = 'block';
        // Pausamos o desenfocamos el fondo
        document.getElementById('game').style.filter = menuId === 'menu-main' ? 'none' : 'blur(10px) brightness(0.5)';
    }

    // --- AQUÍ IRÍA TODA LA LÓGICA DEL JUEGO QUE YA TENÍAMOS ---
    // (La mantendremos igual pero adaptada a esta estructura)

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let highScore = localStorage.getItem('voidHighScore') || 0;
    document.getElementById('val-best').innerText = highScore;

    function startGame(modo) {
        showMenu('none'); // Esconde menús para jugar
        // Aquí se activaría tu lógica de salto y obstáculos...
        console.log("Iniciando modo: " + modo);
        // Para este ejemplo, simulamos que mueres a los 3 segundos
        setTimeout(() => {
            showMenu('menu-death');
        }, 3000);
    }

    // Dibujamos un fondo simple para que no se vea negro
    function animate() {
        ctx.fillStyle = '#050510';
        ctx.fillRect(0,0,canvas.width, canvas.height);
        requestAnimationFrame(animate);
    }
    animate();

</script>
</body>
</html>
