<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; touch-action: none; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 800, // Usamos un ancho fijo interno
    height: 600, // Usamos un alto fijo interno
    backgroundColor: '#000000',
    parent: 'game-container',
    scale: {
        mode: Phaser.Scale.FIT, // Esto ajusta el juego al móvil automáticamente
        autoCenter: Phaser.Scale.CENTER_BOTH
    },
    physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
    scene: { preload: preload, create: create, update: update }
};

let player, obstacles, score = 0, scoreText, isGameOver = false, gameStarted = false;
const game = new Phaser.Game(config);

function preload() {}

function create() {
    // El jugador se dibuja en coordenadas fijas
    player = this.add.rectangle(150, 300, 40, 40, 0x00ffff);
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true);
    
    obstacles = this.physics.add.group();

    let startText = this.add.text(400, 300, 'TOUCH TO START', { fontSize: '40px', fill: '#00ffff' }).setOrigin(0.5);

    this.input.on('pointerdown', () => {
        if (!gameStarted) {
            gameStarted = true;
            startText.destroy();
            player.body.setVelocityY(400);
            
            // Generador de obstáculos manual
            this.time.addEvent({ 
                delay: 1500, 
                callback: () => {
                    if (isGameOver) return;
                    const isTop = Math.random() > 0.5;
                    const py = isTop ? 0 : 400; // Posición fija arriba o abajo
                    
                    // Creamos el bloque en el borde derecho fijo (800)
                    let obs = this.add.rectangle(850, py + 100, 60, 200, 0xffffff);
                    this.physics.add.existing(obs);
                    obs.body.setVelocityX(-400);
                    obstacles.add(obs);
                }, 
                callbackScope: this, 
                loop: true 
            });
        } else if (!isGameOver) {
            player.body.setVelocityY(player.body.velocity.y * -1);
            player.setFillStyle(player.body.velocity.y > 0 ? 0x00ffff : 0xff00ff);
        }
    });

    scoreText = this.add.text(400, 100, '0', { fontSize: '100px', fill: '#fff' }).setOrigin(0.5).setAlpha(0.2);
}

function update() {
    if (isGameOver) return;

    this.physics.add.overlap(player, obstacles, () => {
        isGameOver = true;
        this.cameras.main.shake(200);
        setTimeout(() => { location.reload(); }, 500);
    });

    obstacles.children.iterate(child => {
        if (child && child.x < -100) {
            child.destroy();
            score++;
            scoreText.setText(score);
        }
    });
}
</script>
</body>
</html>
