<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID - DUAL</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; transition: filter 0.5s ease; }
        .blurred { filter: blur(10px) brightness(0.3); }
        #ui-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: white; display: none; width: 85%; z-index: 10;
        }
        #ui-overlay img { max-width: 140px; margin-bottom: 15px; border-radius: 20px; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui-overlay">
        <img id="logo" src="logo.jpg" alt="Logo">
        <h1 id="final-score">SCORE: 0</h1>
        <p id="high-score">BEST: 0</p>
        <p style="color: #aaa; margin-top: 20px;" id="instruction-retry">Tap to try again</p>
    </div>

<script>
    const lang = navigator.language.startsWith('es') ? 'es' : 'en';
    const texts = {
        es: { start: 'TOCA PARA SALTAR', score: 'PUNTOS', best: 'RÉCORD', retry: 'Toca para reintentar' },
        en: { start: 'TAP TO JUMP', score: 'SCORE', best: 'BEST', retry: 'Tap to try again' }
    };

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui-overlay');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    let highScore = localStorage.getItem('voidHighScore') || 0;
    let gameStarted = false;
    let gameOver = false;
    let gameSpeed = 5;
    let trail = [];
    let stars = [];

    for(let i = 0; i < 50; i++) {
        stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2, speed: Math.random() * 0.5 + 0.2 });
    }

    const player = {
        x: canvas.width * 0.2,
        y: canvas.height / 2,
        size: 30,
        vy: 0,
        gravity: 0.65, 
        jump: -12,
        angle: 0
    };

    let obstacles = [];
    let frame = 0;

    function spawnObstacle() {
        const type = Math.random();
        const w = 65;
        const gap = 190;
        // Decisión de color: 50% rosa, 50% azul
        const obsColor = Math.random() > 0.5 ? '#ff00ff' : '#00ffff';
        
        if (type < 0.45) {
            const minGateY = 80;
            const maxGateY = canvas.height - gap - 80;
            const gateY = Math.random() * (maxGateY - minGateY) + minGateY;
            obstacles.push({ x: canvas.width + 100, y: 0, w: w, h: gateY, edge: obsColor });
            obstacles.push({ x: canvas.width + 100, y: gateY + gap, w: w, h: canvas.height - (gateY + gap), edge: obsColor });
        } else {
            const h = Math.random() * (canvas.height * 0.3) + 150;
            const isTop = Math.random() > 0.5;
            obstacles.push({ x: canvas.width + 100, y: isTop ? 0 : canvas.height - h, w: w, h: h, edge: obsColor });
        }
    }

    function resetGame() {
        score = 0; gameSpeed = 5; obstacles = []; trail = []; frame = 0;
        gameOver = false; gameStarted = false;
        player.y = canvas.height / 2; player.vy = 0;
        ui.style.display = 'none';
        canvas.classList.remove('blurred');
    }

    function update() {
        if (!gameStarted || gameOver) return;
        frame++;
        player.vy += player.gravity;
        player.y += player.vy;
        player.angle = Math.min(Math.PI/4, Math.max(-Math.PI/4, player.vy * 0.04));

        stars.forEach(s => { s.x -= s.speed; if(s.x < 0) s.x = canvas.width; });

        trail.push({ x: player.x, y: player.y, angle: player.angle });
        if (trail.length > 12) trail.shift();

        if (player.y < 0 || player.y + player.size > canvas.height) endGame();

        if (frame % Math.max(30, Math.floor(85 - score * 0.6)) === 0) spawnObstacle();

        obstacles.forEach((obs, index) => {
            obs.x -= (gameSpeed + score * 0.22);
            if (player.x < obs.x + obs.w && player.x + player.size > obs.x &&
                player.y < obs.y + obs.h && player.y + player.size > obs.y) endGame();
            
            if (!obs.passed && obs.x + obs.w < player.x) {
                obs.passed = true;
                if (index === 0 || obstacles[index-1].x !== obs.x) score++;
            }
            if (obs.x + obs.w < -100) obstacles.splice(index, 1);
        });
    }

    function endGame() {
        gameOver = true;
        if (score > highScore) { highScore = score; localStorage.setItem('voidHighScore', highScore); }
        document.getElementById('final-score').innerText = `${texts[lang].score}: ${score}`;
        document.getElementById('high-score').innerText = `${texts[lang].best}: ${highScore}`;
        ui.style.display = 'block';
        canvas.classList.add('blurred');
    }

    function draw() {
        let grdBg = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 5, canvas.width/2, canvas.height/2, canvas.width);
        grdBg.addColorStop(0, "#0a0a1a"); grdBg.addColorStop(1, "#000000");
        ctx.fillStyle = grdBg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#fff";
        stars.forEach(s => { ctx.globalAlpha = 0.2; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill(); });
        ctx.globalAlpha = 1.0;

        ctx.fillStyle = 'rgba(255,255,255,0.03)';
        ctx.font = 'bold 200px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(score, canvas.width/2, canvas.height/2 + 70);

        // JUGADOR DUAL (Azul + Rosa)
        const drawPlayerBody = (x, y, size, angle, isTrail) => {
            ctx.save();
            ctx.translate(x + size/2, y + size/2);
            ctx.rotate(angle);
            
            // Degradado Dual
            let pGrd = ctx.createLinearGradient(-size/2, -size/2, size/2, size/2);
            pGrd.addColorStop(0, '#00ffff'); // Azul
            pGrd.addColorStop(1, '#ff00ff'); // Rosa
            
            if (!isTrail) {
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ffff';
            }
            
            ctx.fillStyle = pGrd;
            ctx.fillRect(-size/2, -size/2, size, size);
            
            if (!isTrail) {
                ctx.fillStyle = '#fff';
                ctx.fillRect(-size/4, -size/4, size/2, size/2);
            }
            ctx.restore();
        };

        // Dibujar Estela
        trail.forEach((t, i) => {
            ctx.globalAlpha = i / trail.length * 0.3;
            drawPlayerBody(t.x, t.y, player.size, t.angle, true);
        });
        ctx.globalAlpha = 1.0;

        // Dibujar Jugador Actual
        drawPlayerBody(player.x, player.y, player.size, player.angle, false);
        ctx.shadowBlur = 0;

        // Obstáculos Puros
        obstacles.forEach(obs => {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            ctx.strokeStyle = obs.edge;
            ctx.lineWidth = 3;
            ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
            
            ctx.globalAlpha = 0.15;
            ctx.fillStyle = obs.edge;
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            ctx.globalAlpha = 1.0;
        });

        if (!gameStarted && !gameOver) {
            ctx.fillStyle = '#fff'; ctx.font = 'bold 22px sans-serif';
            ctx.fillText(texts[lang].start, canvas.width/2, canvas.height/2 + 200);
        }

        update();
        requestAnimationFrame(draw);
    }

    window.addEventListener('pointerdown', () => {
        if (gameOver) resetGame();
        else { gameStarted = true; player.vy = player.jump; }
    });

    draw();
</script>
</body>
</html>
