<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID - HARDCORE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; transition: filter 0.5s ease; }
        .blurred { filter: blur(10px) brightness(0.3); }
        #ui-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: white; display: none; width: 85%; z-index: 10;
        }
        #ui-overlay img { max-width: 140px; margin-bottom: 15px; border-radius: 20px; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui-overlay">
        <img id="logo" src="logo.jpg" alt="Logo">
        <h1 id="final-score">SCORE: 0</h1>
        <p id="high-score">BEST: 0</p>
        <p style="color: #aaa; margin-top: 20px;" id="instruction-retry">Tap to try again</p>
    </div>

<script>
    const lang = navigator.language.startsWith('es') ? 'es' : 'en';
    const texts = {
        es: { start: 'TOCA PARA SALTAR', score: 'PUNTOS', best: 'RÉCORD', retry: 'Toca para reintentar' },
        en: { start: 'TAP TO JUMP', score: 'SCORE', best: 'BEST', retry: 'Tap to try again' }
    };

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui-overlay');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    let highScore = localStorage.getItem('voidHighScore') || 0;
    let gameStarted = false;
    let gameOver = false;
    let gameSpeed = 5;
    let trail = [];
    let stars = [];

    // Estrellas de fondo
    for(let i = 0; i < 50; i++) {
        stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2, speed: Math.random() * 0.5 + 0.2 });
    }

    const player = {
        x: canvas.width * 0.2,
        y: canvas.height / 2,
        size: 30,
        vy: 0,
        gravity: 0.6, // Fuerza de caída
        jump: -10,    // Fuerza de salto
        angle: 0
    };

    let obstacles = [];
    let frame = 0;

    function spawnObstacle() {
        const type = Math.random();
        const w = 65;
        
        if (type < 0.6) {
            // Obstáculo clásico (Arriba o Abajo)
            const h = Math.random() * (canvas.height * 0.4) + (canvas.height * 0.2);
            const isTop = Math.random() > 0.5;
            obstacles.push({ x: canvas.width + 100, y: isTop ? 0 : canvas.height - h, w: w, h: h, edge: isTop ? '#ff00ff' : '#00ffff' });
        } else {
            // NUEVO: Obstáculo Central (Flotante)
            const h = 180;
            const y = Math.random() * (canvas.height - h - 200) + 100;
            obstacles.push({ x: canvas.width + 100, y: y, w: w, h: h, edge: '#ffff00' }); // Amarillo neón para peligro central
        }
    }

    function resetGame() {
        score = 0; gameSpeed = 5; obstacles = []; trail = []; frame = 0;
        gameOver = false; gameStarted = false;
        player.y = canvas.height / 2; player.vy = 0;
        ui.style.display = 'none';
        canvas.classList.remove('blurred');
    }

    function update() {
        if (!gameStarted || gameOver) return;
        frame++;
        
        // FÍSICA FLAPPY
        player.vy += player.gravity;
        player.y += player.vy;
        player.angle = Math.min(Math.PI/4, Math.max(-Math.PI/4, player.vy * 0.05)); // Inclina el cubo según cae/sube

        stars.forEach(s => { s.x -= s.speed; if(s.x < 0) s.x = canvas.width; });

        trail.push({ x: player.x, y: player.y, angle: player.angle });
        if (trail.length > 12) trail.shift();

        if (player.y < 0 || player.y + player.size > canvas.height) endGame();

        if (frame % Math.max(40, Math.floor(90 - score * 0.5)) === 0) spawnObstacle();

        obstacles.forEach((obs, index) => {
            obs.x -= (gameSpeed + score * 0.15);
            if (player.x < obs.x + obs.w && player.x + player.size > obs.x &&
                player.y < obs.y + obs.h && player.y + player.size > obs.y) endGame();
            if (obs.x + obs.w < 0) { obstacles.splice(index, 1); score++; }
        });
    }

    function endGame() {
        gameOver = true;
        if (score > highScore) { highScore = score; localStorage.setItem('voidHighScore', highScore); }
        document.getElementById('final-score').innerText = `${texts[lang].score}: ${score}`;
        document.getElementById('high-score').innerText = `${texts[lang].best}: ${highScore}`;
        ui.style.display = 'block';
        canvas.classList.add('blurred');
    }

    function draw() {
        let grd = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 5, canvas.width/2, canvas.height/2, canvas.width);
        grd.addColorStop(0, "#0a0a1a"); grd.addColorStop(1, "#000000");
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#fff";
        stars.forEach(s => { ctx.globalAlpha = 0.3; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill(); });
        ctx.globalAlpha = 1.0;

        ctx.fillStyle = 'rgba(255,255,255,0.03)';
        ctx.font = 'bold 200px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(score, canvas.width/2, canvas.height/2 + 70);

        // Estela
        trail.forEach((t, i) => {
            ctx.save();
            ctx.translate(t.x + player.size/2, t.y + player.size/2);
            ctx.rotate(t.angle);
            ctx.globalAlpha = i / trail.length * 0.3;
            ctx.strokeStyle = '#00ffff';
            ctx.strokeRect(-player.size/2, -player.size/2, player.size, player.size);
            ctx.restore();
        });
        ctx.globalAlpha = 1.0;

        // Jugador
        ctx.save();
        ctx.translate(player.x + player.size/2, player.y + player.size/2);
        ctx.rotate(player.angle);
        ctx.shadowBlur = 20; ctx.shadowColor = '#00ffff';
        ctx.fillStyle = '#00ffff';
        ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
        ctx.fillStyle = '#fff';
        ctx.fillRect(-player.size/4, -player.size/4, player.size/2, player.size/2);
        ctx.restore();
        ctx.shadowBlur = 0;

        // Obstáculos
        obstacles.forEach(obs => {
            ctx.fillStyle = '#111';
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            ctx.strokeStyle = obs.edge;
            ctx.lineWidth = 3;
            ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
        });

        if (!gameStarted && !gameOver) {
            ctx.fillStyle = '#fff'; ctx.font = 'bold 22px sans-serif';
            ctx.fillText(texts[lang].start, canvas.width/2, canvas.height/2 + 200);
        }

        update();
        requestAnimationFrame(draw);
    }

    window.addEventListener('pointerdown', () => {
        if (gameOver) resetGame();
        else {
            gameStarted = true;
            player.vy = player.jump; // Salto hacia arriba
        }
    });

    draw();
</script>
</body>
</html>
