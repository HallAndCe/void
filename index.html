<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID - Gravity Runner</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor: '#050505',
    physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } }, // Empezamos sin gravedad
    scene: { preload: preload, create: create, update: update }
};

let player, obstacles, score = 0, scoreText, isGameOver = false, gameStarted = false;
let gravityValue = 1200;
const game = new Phaser.Game(config);

function preload() {}

function create() {
    const w = window.innerWidth;
    const h = window.innerHeight;

    player = this.add.rectangle(w * 0.2, h / 2, 35, 35, 0x00ffff);
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true);
    
    obstacles = this.physics.add.group();

    let startText = this.add.text(w/2, h/2, 'TAP TO START', { fontSize: '32px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5);

    this.input.on('pointerdown', () => {
        if (!gameStarted) {
            gameStarted = true;
            startText.destroy();
            player.body.setGravityY(gravityValue); // Activamos gravedad al empezar
            this.time.addEvent({ delay: 1300, callback: addObstacle, callbackScope: this, loop: true });
        }
        
        if (!isGameOver) {
            // EL TRUCO: Invertimos gravedad Y damos un pequeño impulso
            let currentGravity = player.body.gravity.y;
            player.body.setGravityY(currentGravity * -1);
            
            // Impulso inmediato para despegarse del suelo/techo
            player.body.setVelocityY(currentGravity > 0 ? -400 : 400);
            
            player.setFillStyle(player.body.gravity.y > 0 ? 0x00ffff : 0xff00ff);
        }
    });

    scoreText = this.add.text(w/2, 80, '0', { fontSize: '80px', fill: '#ffffff', fontStyle: 'bold' }).setOrigin(0.5).setAlpha(0.2);
}

function addObstacle() {
    if (isGameOver || !gameStarted) return;
    const w = window.innerWidth;
    const h = window.innerHeight;
    
    const isTop = Math.random() > 0.5;
    const obsHeight = h * 0.4; // Un poco más grandes para que sea un reto
    const py = isTop ? 0 : h - obsHeight;
    
    let obs = this.add.rectangle(w + 100, py + (obsHeight/2), 60, obsHeight, 0xffffff, 0.1);
    obs.setStrokeStyle(3, 0xffffff);
    this.physics.add.existing(obs);
    obs.body.setAllowGravity(false);
    obs.body.setVelocityX(-400 - (score * 10)); // Velocidad base más rápida
    obstacles.add(obs);
}

function update() {
    if (!gameStarted || isGameOver) return;
    
    this.physics.add.overlap(player, obstacles, () => {
        isGameOver = true;
        this.cameras.main.shake(250, 0.04);
        setTimeout(() => { location.reload(); }, 600);
    });

    obstacles.children.iterate(child => {
        if (child && child.x < -100) {
            child.destroy();
            score++;
            scoreText.setText(score);
        }
    });
}
</script>
</body>
</html>
