He unificado la lógica de las skins, la explosión, la sacudida de pantalla y el escalado de móvil en un solo archivo final para que solo tengas que "copiar y pegar".

Código Completo "VOID - Ultimate Skin Edition"

HTML
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID - ULTIMATE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; transition: filter 0.3s ease; }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; pointer-events: none; z-index: 10;
        }
        .menu-box {
            text-align: center; background: rgba(0,0,0,0.8); padding: 30px;
            border-radius: 20px; border: 1px solid #333; backdrop-filter: blur(8px);
            display: none; pointer-events: auto; width: 80%; max-width: 300px;
        }
        #logo { max-width: 110px; border-radius: 15px; margin-bottom: 10px; border: 2px solid #00ffff; }
        h1 { margin: 0; font-size: 38px; letter-spacing: 5px; color: #fff; text-shadow: 0 0 15px #00ffff; }
        .btn-start { margin-top: 20px; padding: 12px 25px; background: #ff00ff; color: #fff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px #ff00ff; }
        #unlock-msg { font-weight: bold; margin-top: 10px; min-height: 20px; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    
    <div id="ui-layer">
        <div id="main-menu" class="menu-box" style="display: block;">
            <img src="logo.jpg" id="logo" alt="Logo">
            <h1>VOID</h1>
            <p id="high-score-main">BEST: 0</p>
            <button class="btn-start" onclick="startGame()">JUGAR</button>
        </div>

        <div id="death-screen" class="menu-box">
            <h2 id="final-score">SCORE: 0</h2>
            <p id="high-score-death">BEST: 0</p>
            <div id="unlock-msg"></div>
            <button class="btn-start" onclick="startGame()">REINTENTAR</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const menu = document.getElementById('main-menu');
    const deathScreen = document.getElementById('death-screen');

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    let score = 0;
    let highScore = localStorage.getItem('voidHighScore') || 0;
    document.getElementById('high-score-main').innerText = "BEST: " + highScore;

    let gameStarted = false, gameOver = false, frame = 0, gameSpeed = 0, shakeTimer = 0;
    let player, obstacles, trail, stars, particles;

    // --- LÓGICA DE SKINS ---
    function getSkinTier(val) {
        if (val >= 100) return 6; // Void God
        if (val >= 75)  return 5; // Legend
        if (val >= 50)  return 4; // Master
        if (val >= 20)  return 3; // Electric
        if (val >= 10)  return 2; // Neon
        if (val >= 5)   return 1; // Scout
        return 0;
    }

    function init() {
        const isMobile = canvas.width < 500;
        player = { 
            x: canvas.width * 0.2, y: canvas.height / 2, 
            size: isMobile ? 26 : 30, vy: 0, gravity: 0.6, jump: -11, angle: 0 
        };
        obstacles = []; trail = []; particles = []; stars = [];
        for(let i = 0; i < 40; i++) stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2, speed: Math.random() * 0.4 + 0.1 });
        gameSpeed = isMobile ? canvas.width * 0.0085 : 5.5;
    }

    function startGame() {
        init();
        score = 0; frame = 0;
        gameStarted = true; gameOver = false;
        menu.style.display = 'none';
        deathScreen.style.display = 'none';
        canvas.style.filter = 'none';
    }

    function createExplosion(x, y) {
        for(let i = 0; i < 20; i++) {
            particles.push({
                x: x, y: y, vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12,
                size: Math.random() * 6, life: 1.0, color: Math.random() > 0.5 ? '#00ffff' : '#ff00ff'
            });
        }
    }

    function update() {
        if (!gameStarted || gameOver) {
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                if(p.life <= 0) particles.splice(i, 1);
            });
            return;
        }

        frame++;
        player.vy += player.gravity;
        player.y += player.vy;
        player.angle = Math.min(Math.PI/4, Math.max(-Math.PI/4, player.vy * 0.04));

        stars.forEach(s => { s.x -= s.speed; if(s.x < 0) s.x = canvas.width; });

        // Estela adaptativa según Skin
        trail.push({ x: player.x, y: player.y, angle: player.angle });
        let maxTrail = 10 + (getSkinTier(highScore) * 4);
        if (trail.length > maxTrail) trail.shift();

        if (player.y < 0 || player.y + player.size > canvas.height) endGame();

        let spawnRate = canvas.width < 500 ? 95 : 82;
        if (frame % Math.max(32, Math.floor(spawnRate - score * 0.7)) === 0) spawnObstacle();

        obstacles.forEach((obs, index) => {
            obs.x -= (gameSpeed + score * 0.22);
            if (player.x < obs.x + obs.w && player.x + player.size > obs.x &&
                player.y < obs.y + obs.h && player.y + player.size > obs.y) endGame();
            if (!obs.passed && obs.x + obs.w < player.x) {
                obs.passed = true;
                if (index === 0 || obstacles[index-1].x !== obs.x) score++;
            }
            if (obs.x + obs.w < -100) obstacles.splice(index, 1);
        });
    }

    function spawnObstacle() {
        const w = canvas.width < 500 ? 52 : 65;
        const gap = canvas.width < 500 ? 175 : 195;
        const obsColor = Math.random() > 0.5 ? '#ff00ff' : '#00ffff';
        if (Math.random() < 0.45) {
            const gateY = Math.random() * (canvas.height - gap - 160) + 80;
            obstacles.push({ x: canvas.width + 100, y: 0, w: w, h: gateY, edge: obsColor });
            obstacles.push({ x: canvas.width + 100, y: gateY + gap, w: w, h: canvas.height - (gateY + gap), edge: obsColor });
        } else {
            const h = Math.random() * (canvas.height * 0.3) + 140;
            const isTop = Math.random() > 0.5;
            obstacles.push({ x: canvas.width + 100, y: isTop ? 0 : canvas.height - h, w: w, h: h, edge: obsColor });
        }
    }

    function endGame() {
        if (gameOver) return;
        gameOver = true; shakeTimer = 18;
        createExplosion(player.x, player.y);
        
        const oldTier = getSkinTier(highScore);
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('voidHighScore', highScore);
        }
        const newTier = getSkinTier(highScore);

        setTimeout(() => {
            document.getElementById('final-score').innerText = "SCORE: " + score;
            document.getElementById('high-score-death').innerText = "BEST: " + highScore;
            
            const goals = [5, 10, 20, 50, 75, 100];
            let next = goals.find(g => g > highScore);
            let msg = newTier > oldTier ? "¡NUEVA SKIN!" : (next ? `SIGUIENTE SKIN EN ${next}` : "DIOS DEL VACÍO");
            document.getElementById('unlock-msg').innerText = msg;
            document.getElementById('unlock-msg').style.color = newTier > oldTier ? "#0f0" : "#0ff";

            deathScreen.style.display = 'block';
            canvas.style.filter = 'blur(8px) brightness(0.4)';
        }, 700);
    }

    function draw() {
        ctx.save();
        if (shakeTimer > 0) { ctx.translate(Math.random()*10-5, Math.random()*10-5); shakeTimer--; }

        let grdBg = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 5, canvas.width/2, canvas.height/2, canvas.width);
        grdBg.addColorStop(0, "#0a0a1a"); grdBg.addColorStop(1, "#000");
        ctx.fillStyle = grdBg; ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "white";
        stars.forEach(s => { ctx.globalAlpha = 0.2; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); });
        ctx.globalAlpha = 0.04; ctx.font = `bold ${canvas.width < 500 ? '120px' : '200px'} sans-serif`;
        ctx.textAlign = 'center'; ctx.fillText(score, canvas.width/2, canvas.height/2 + 70);
        ctx.globalAlpha = 1.0;

        const tier = getSkinTier(highScore);

        // Dibujar Estela
        trail.forEach((t, i) => {
            ctx.save(); ctx.translate(t.x + player.size/2, t.y + player.size/2); ctx.rotate(t.angle);
            ctx.globalAlpha = (i / trail.length) * 0.4;
            let g = ctx.createLinearGradient(-player.size/2, -player.size/2, player.size/2, player.size/2);
            g.addColorStop(0, '#0ff'); g.addColorStop(1, '#f0f');
            ctx.fillStyle = g; ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
            ctx.restore();
        });

        // Dibujar Jugador
        if (!gameOver) {
            ctx.save();
            ctx.translate(player.x + player.size/2, player.y + player.size/2); ctx.rotate(player.angle);
            
            // Efectos de Skin (Tier)
            if(tier >= 2) { ctx.shadowBlur = 10 + tier*2; ctx.shadowColor = '#0ff'; }
            if(tier >= 4) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.strokeRect(-player.size/2-2, -player.size/2-2, player.size+4, player.size+4); }
            
            let g = ctx.createLinearGradient(-player.size/2, -player.size/2, player.size/2, player.size/2);
            g.addColorStop(0, '#0ff'); g.addColorStop(1, '#f0f');
            ctx.fillStyle = g; ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
            
            ctx.fillStyle = (tier >= 1) ? '#0ff' : '#fff';
            ctx.fillRect(-player.size/4, -player.size/4, player.size/2, player.size/2);
            
            if(tier >= 6 && Math.random() > 0.7) { // Aura Dios
                particles.push({ x: player.x+15, y: player.y+15, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, size: 2, life: 0.4, color: '#fff' });
            }
            ctx.restore();
        }

        particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); });
        ctx.globalAlpha = 1.0;

        obstacles.forEach(obs => {
            ctx.fillStyle = '#0a0a0a'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            ctx.strokeStyle = obs.edge; ctx.lineWidth = 3; ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
            ctx.globalAlpha = 0.1; ctx.fillStyle = obs.edge; ctx.fillRect(obs.x, obs.y, obs.w, obs.h); ctx.globalAlpha = 1.0;
        });

        ctx.restore();
        update();
        requestAnimationFrame(draw);
    }

    window.addEventListener('pointerdown', () => { if (gameStarted && !gameOver) player.vy = player.jump; });
    init(); draw();
</script>
</body>
</html>
