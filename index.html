<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; touch-action: none; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor: '#000000',
    physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
    scene: { preload: preload, create: create, update: update }
};

let player, obstacles, score = 0, scoreText, isGameOver = false, gameStarted = false;
const game = new Phaser.Game(config);

function preload() {}

function create() {
    const w = window.innerWidth;
    const h = window.innerHeight;

    player = this.add.rectangle(w * 0.15, h / 2, 40, 40, 0x00ffff);
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true);
    
    obstacles = this.physics.add.group();

    let startText = this.add.text(w/2, h/2, 'TOUCH TO START', { fontSize: '32px', fill: '#00ffff' }).setOrigin(0.5);

    this.input.on('pointerdown', () => {
        if (!gameStarted) {
            gameStarted = true;
            startText.destroy();
            player.body.setVelocityY(450);
            
            // LANZAR EL PRIMERO MANUALMENTE PARA FORZARLO
            addObstacle.call(this); 
            
            // Programar los siguientes
            this.time.addEvent({ 
                delay: 1200, 
                callback: addObstacle, 
                callbackScope: this, 
                loop: true 
            });
        } else if (!isGameOver) {
            player.body.setVelocityY(player.body.velocity.y * -1);
            player.setFillStyle(player.body.velocity.y > 0 ? 0x00ffff : 0xff00ff);
        }
    });

    scoreText = this.add.text(w/2, 100, '0', { fontSize: '100px', fill: '#fff' }).setOrigin(0.5).setAlpha(0.2);
}

function addObstacle() {
    if (isGameOver) return;
    
    const w = window.innerWidth;
    const h = window.innerHeight;
    
    const isTop = Math.random() > 0.5;
    const obsHeight = h * 0.4;
    const py = isTop ? 0 : h - obsHeight;
    
    // Lo creamos un poco más a la izquierda (w + 10) para verlo antes
    let obs = this.add.rectangle(w + 20, py + (obsHeight/2), 80, obsHeight, 0xffffff);
    this.physics.add.existing(obs);
    
    // VELOCIDAD EXTREMA PARA ASEGURAR QUE PASA POR PANTALLA
    obs.body.setVelocityX(-600); 
    obstacles.add(obs);
}

function update() {
    if (isGameOver) return;

    this.physics.add.overlap(player, obstacles, () => {
        isGameOver = true;
        this.cameras.main.shake(200);
        setTimeout(() => { location.reload(); }, 500);
    });

    obstacles.children.iterate(child => {
        if (child && child.x < -100) {
            child.destroy();
            score++;
            scoreText.setText(score);
        }
    });
}
</script>
</body>
</html>
