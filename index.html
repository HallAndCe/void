<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID - PRO</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        canvas { display: block; background: #050505; }
        #ui-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: white; display: none; width: 80%;
        }
        #ui-overlay img { max-width: 150px; margin-bottom: 20px; border-radius: 10px; }
        #ui-overlay h1 { font-size: 40px; margin: 0; color: #ff00ff; }
        #ui-overlay p { font-size: 20px; margin: 10px 0; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    
    <!-- Pantalla de Muerte -->
    <div id="ui-overlay">
        <img id="logo" src="logo.jpg" alt="Void Logo">
        <h1 id="final-score">PUNTOS: 0</h1>
        <p id="high-score">RÉCORD: 0</p>
        <p style="font-size: 14px; color: #666;">Toca para reintentar</p>
    </div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui-overlay');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    let highScore = localStorage.getItem('voidHighScore') || 0;
    let gameStarted = false;
    let gameOver = false;
    let gameSpeed = 5;

    const player = {
        x: canvas.width * 0.2,
        y: canvas.height / 2,
        size: 30,
        vy: 0,
        speed: 7,
        color: '#00ffff'
    };

    let obstacles = [];
    let frame = 0;

    function spawnObstacle() {
        // Variación de obstáculos: Altura aleatoria entre 20% y 55% de la pantalla
        const minH = canvas.height * 0.2;
        const maxH = canvas.height * 0.55;
        const h = Math.random() * (maxH - minH) + minH;
        
        const isTop = Math.random() > 0.5;
        obstacles.push({
            x: canvas.width + 100,
            y: isTop ? 0 : canvas.height - h,
            w: 60,
            h: h
        });
    }

    function resetGame() {
        score = 0;
        gameSpeed = 5;
        obstacles = [];
        frame = 0;
        gameOver = false;
        gameStarted = false;
        player.y = canvas.height / 2;
        player.vy = 0;
        ui.style.display = 'none';
    }

    function update() {
        if (!gameStarted || gameOver) return;

        frame++;
        player.y += player.vy;

        // Limites
        if (player.y < 0 || player.y + player.size > canvas.height) {
            endGame();
        }

        // Frecuencia de obstáculos según velocidad
        if (frame % Math.max(30, Math.floor(80 - score * 0.5)) === 0) spawnObstacle();

        obstacles.forEach((obs, index) => {
            obs.x -= (gameSpeed + score * 0.15); // ACELERACIÓN PROGRESIVA

            // Colisión
            if (player.x < obs.x + obs.w &&
                player.x + player.size > obs.x &&
                player.y < obs.y + obs.h &&
                player.y + player.size > obs.y) {
                endGame();
            }

            if (obs.x + obs.w < 0) {
                obstacles.splice(index, 1);
                score++;
            }
        });
    }

    function endGame() {
        gameOver = true;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('voidHighScore', highScore);
        }
        document.getElementById('final-score').innerText = "PUNTOS: " + score;
        document.getElementById('high-score').innerText = "RÉCORD: " + highScore;
        ui.style.display = 'block';
    }

    function draw() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Score de fondo
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.font = 'bold 150px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(score, canvas.width/2, canvas.height/2 + 50);

        // Jugador con estela simple (opcional)
        ctx.fillStyle = player.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = player.color;
        ctx.fillRect(player.x, player.y, player.size, player.size);
        ctx.shadowBlur = 0; // Reset sombra para lo demás

        // Obstáculos con borde
        obstacles.forEach(obs => {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            ctx.strokeStyle = '#ff00ff';
            ctx.lineWidth = 2;
            ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
        });

        if (!gameStarted && !gameOver) {
            ctx.fillStyle = '#fff';
            ctx.font = '20px sans-serif';
            ctx.fillText('TOCA PARA EMPEZAR', canvas.width/2, canvas.height/2 + 150);
        }

        update();
        requestAnimationFrame(draw);
    }

    window.addEventListener('pointerdown', () => {
        if (gameOver) {
            resetGame();
        } else if (!gameStarted) {
            gameStarted = true;
            player.vy = player.speed;
        } else {
            player.vy *= -1;
            player.color = player.vy > 0 ? '#00ffff' : '#ff00ff';
        }
    });

    draw();
</script>
</body>
</html>
