<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID - Fix Edition</title>
    <style>
        :root { --neon: #00ffff; --pink: #ff00ff; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; }
        canvas { display: block; background: #050510; }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; z-index: 10;
        }

        .menu-box {
            text-align: center; background: rgba(0,0,0,0.9); padding: 25px;
            border-radius: 20px; border: 2px solid #333; backdrop-filter: blur(10px);
            display: none; pointer-events: auto; width: 85%; max-width: 320px;
        }

        h1 { font-size: 40px; letter-spacing: 8px; margin: 10px 0; text-shadow: 0 0 15px var(--neon); }
        
        .btn {
            width: 100%; margin: 8px 0; padding: 12px;
            background: #111; color: white; border: 1px solid #444;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); background: var(--neon); color: #000; }
        .btn-main { border: 2px solid var(--pink); box-shadow: 0 0 10px rgba(255,0,255,0.2); }

        .stat-bar { background: #1a1a1a; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-around; font-size: 14px; }
        .lang-selector { margin-bottom: 15px; font-size: 12px; color: #888; }
        .lang-selector span { cursor: pointer; margin: 0 5px; padding: 2px 5px; border: 1px solid #444; }
        .lang-active { color: var(--neon); border-color: var(--neon) !important; }
    </style>
</head>
<body>

    <canvas id="game"></canvas>

    <div id="ui-layer">
        <!-- 1. MENÚ PRINCIPAL -->
        <div id="menu-main" class="menu-box" style="display: block;">
            <div class="lang-selector">
                <span id="lang-es" class="lang-active" onclick="setLanguage('es')">ESP</span> | 
                <span id="lang-en" onclick="setLanguage('en')">ENG</span>
            </div>
            <h1>VOID</h1>
            <div class="stat-bar">
                <span id="txt-best-label">RÉCORD</span>: <span id="val-best">0</span>
                <span>💰 <span id="val-coins">0</span></span>
            </div>
            <button class="btn btn-main" id="btn-play" onclick="showMenu('menu-play')">JUGAR</button>
            <button class="btn" id="btn-store" onclick="showMenu('menu-store')">TIENDA</button>
            <button class="btn" id="btn-opts" onclick="showMenu('menu-options')">OPCIONES</button>
        </div>

        <!-- 2. SELECCIÓN DE MODO -->
        <div id="menu-play" class="menu-box">
            <h2 id="txt-modes">MODOS</h2>
            <button class="btn btn-main" id="btn-inf" onclick="startGame()">INFINITO</button>
            <button class="btn" id="btn-levels" style="opacity: 0.4">NIVELES (PRÓX.)</button>
            <button class="btn" id="btn-back1" onclick="showMenu('menu-main')" style="color: var(--pink)">VOLVER</button>
        </div>

        <!-- 3. MUERTE -->
        <div id="menu-death" class="menu-box">
            <h2 id="txt-gameover">GAME OVER</h2>
            <div class="stat-bar">
                <span id="txt-score-label">PUNTOS</span>: <span id="val-score-death">0</span>
            </div>
            <button class="btn btn-main" id="btn-retry" onclick="startGame()">REINTENTAR</button>
            <button class="btn" id="btn-back2" onclick="showMenu('menu-main')">MENÚ</button>
        </div>

        <!-- TIENDA Y OPCIONES (MANTENEMOS PARA SIGUIENTES PASOS) -->
        <div id="menu-store" class="menu-box"> <h2 id="txt-store-title">TIENDA</h2> <p>Próximamente...</p> <button class="btn" onclick="showMenu('menu-main')">VOLVER</button> </div>
        <div id="menu-options" class="menu-box"> <h2 id="txt-opts-title">OPCIONES</h2> <p>Próximamente...</p> <button class="btn" onclick="showMenu('menu-main')">VOLVER</button> </div>
    </div>

<script>
    // --- TRADUCCIONES ---
    const texts = {
        es: { best: "RÉCORD", play: "JUGAR", store: "TIENDA", opts: "OPCIONES", modes: "MODOS", inf: "INFINITO", levels: "NIVELES", back: "VOLVER", gameover: "FIN DE PARTIDA", score: "PUNTOS", retry: "REINTENTAR" },
        en: { best: "BEST", play: "PLAY", store: "STORE", opts: "OPTIONS", modes: "MODES", inf: "INFINITE", levels: "LEVELS", back: "BACK", gameover: "GAME OVER", score: "SCORE", retry: "RETRY" }
    };
    let currentLang = 'es';

    function setLanguage(lang) {
        currentLang = lang;
        const t = texts[lang];
        document.getElementById('txt-best-label').innerText = t.best;
        document.getElementById('btn-play').innerText = t.play;
        document.getElementById('btn-store').innerText = t.store;
        document.getElementById('btn-opts').innerText = t.opts;
        document.getElementById('txt-modes').innerText = t.modes;
        document.getElementById('btn-inf').innerText = t.inf;
        document.getElementById('btn-back1').innerText = t.back;
        document.getElementById('btn-back2').innerText = t.back;
        document.getElementById('txt-gameover').innerText = t.gameover;
        document.getElementById('txt-score-label').innerText = t.score;
        document.getElementById('btn-retry').innerText = t.retry;
        document.getElementById('txt-store-title').innerText = t.store;
        document.getElementById('txt-opts-title').innerText = t.opts;
        
        document.getElementById('lang-es').className = lang === 'es' ? 'lang-active' : '';
        document.getElementById('lang-en').className = lang === 'en' ? 'lang-active' : '';
    }

    // --- MOTOR DEL JUEGO ---
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let gameActive = false, score = 0, frame = 0;
    let player, obstacles, stars;
    let highScore = localStorage.getItem('voidHighScore') || 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function initGame() {
        player = { x: canvas.width * 0.2, y: canvas.height / 2, size: 30, vy: 0, gravity: 0.6, jump: -10 };
        obstacles = [];
        stars = [];
        for(let i=0; i<40; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});
        score = 0;
        frame = 0;
    }

    function showMenu(id) {
        document.querySelectorAll('.menu-box').forEach(m => m.style.display = 'none');
        if(id !== 'none') {
            document.getElementById(id).style.display = 'block';
            gameActive = false;
            canvas.style.filter = 'blur(10px) brightness(0.4)';
        } else {
            gameActive = true;
            canvas.style.filter = 'none';
        }
    }

    function startGame() {
        initGame();
        showMenu('none');
    }

    function die() {
        gameActive = false;
        if(score > highScore) {
            highScore = score;
            localStorage.setItem('voidHighScore', highScore);
            document.getElementById('val-best').innerText = highScore;
        }
        document.getElementById('val-score-death').innerText = score;
        setTimeout(() => showMenu('menu-death'), 500);
    }

    function update() {
        if(!gameActive) return;

        frame++;
        player.vy += player.gravity;
        player.y += player.vy;

        if(player.y < 0 || player.y + player.size > canvas.height) die();

        // Generar tubos
        if(frame % 90 === 0) {
            let gap = 180;
            let minH = 50;
            let maxH = canvas.height - gap - minH;
            let h = Math.floor(Math.random() * (maxH - minH + 1)) + minH;
            obstacles.push({x: canvas.width, y: 0, w: 50, h: h, passed: false});
            obstacles.push({x: canvas.width, y: h + gap, w: 50, h: canvas.height - h - gap, passed: false});
        }

        obstacles.forEach((o, i) => {
            o.x -= (5 + score * 0.1);
            
            // Colisión
            if(player.x < o.x + o.w && player.x + player.size > o.x && 
               player.y < o.y + o.h && player.y + player.size > o.y) die();
            
            // Puntos
            if(!o.passed && o.x + o.w < player.x) {
                o.passed = true;
                if(i % 2 === 0) score++; // Solo sumamos uno por par de tubos
            }
            
            if(o.x < -60) obstacles.splice(i, 1);
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Estrellas
        ctx.fillStyle = "white";
        stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));

        if(gameActive || document.getElementById('menu-death').style.display === 'block') {
            // Jugador
            ctx.fillStyle = "#00ffff";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#00ffff";
            ctx.fillRect(player.x, player.y, player.size, player.size);
            ctx.shadowBlur = 0;

            // Obstáculos
            ctx.fillStyle = "#ff00ff";
            ctx.strokeStyle = "white";
            ctx.lineWidth = 2;
            obstacles.forEach(o => {
                ctx.fillRect(o.x, o.y, o.w, o.h);
                ctx.strokeRect(o.x, o.y, o.w, o.h);
            });

            // Score flotante
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            ctx.font = "bold 100px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(score, canvas.width/2, canvas.height/2 + 40);
        }

        update();
        requestAnimationFrame(draw);
    }

    // Controles
    window.addEventListener('pointerdown', (e) => {
        if(gameActive) player.vy = player.jump;
    });

    // Iniciar
    document.getElementById('val-best').innerText = highScore;
    setLanguage('es');
    draw();

</script>
</body>
</html>
